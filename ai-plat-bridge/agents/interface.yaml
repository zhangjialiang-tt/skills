# Agent Interface — ai-plat-bridge

name: ai-plat-bridge
version: "3.0"

interface:
  inputs:
    - name: user_request
      type: string
      description: "用户的原始请求"
      required: true
    - name: current_working_directory
      type: string
      description: "当前工作目录；vault 内外执行相同契约"
      required: true
    - name: project_context
      type: object
      description: "可选的项目名称、任务关联和已有约束"
      required: false

  outputs:
    - name: operation_mode
      type: enum
      values: [read, write, clarify, none]
      description: "读取、写入、先澄清或不执行"
    - name: card_type
      type: enum
      values: [task, knowledge, log, project, null]
      description: "唯一目标卡片类型"
    - name: action
      type: enum
      values: [list, search, read, create, update, append, archive, null]
      description: "卡片动作"
    - name: needs_clarification
      type: boolean
      description: "是否必须先询问用户且不得访问 vault"
    - name: primary_target
      type: string
      description: "规范化后的主卡片相对路径"
    - name: linked_actions
      type: array
      description: "显式主写入产生的固定联动"
    - name: verification_result
      type: boolean
      description: "写后重读验证结果"

  behavior:
    - "vault 内外执行同一卡片访问契约"
    - "先确定唯一 card_type，再访问对应目录"
    - "宽泛或跨类型歧义请求先澄清，不访问文件"
    - "只有用户明确要求时才写入"
    - "主写入后按事件矩阵计算并展示 linked_actions"
    - "所有写入必须前读、去重、局部修改、后读验证"

  error_handling:
    - condition: "没有唯一卡片类型"
      action: "needs_clarification=true，不访问 vault"
    - condition: "请求旧记忆、越界路径或不支持动作"
      action: "operation_mode=none，拒绝访问并给出卡片替代"
    - condition: "任务缺少明确项目关联"
      action: "只联动日志卡，不搜索、不创建项目卡"
    - condition: "联动项目卡不存在"
      action: "跳过项目联动并报告，不自动创建"
    - condition: "写后验证失败"
      action: "报告实际状态，不声称已同步"
